<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Coordinate + Color Interpolator</title>
<script src="https://www.x3dom.org/x3dom/release/x3dom.js"></script>
<link rel="stylesheet" href="https://www.x3dom.org/x3dom/release/x3dom.css">
</head>

<body>
<h1 style="text-align:center;">Coordinate + Color Interpolator</h1>

<X3D width="600px" height="400px">
<Scene>

<NavigationInfo headlight="true" type='"examine" "any"'></NavigationInfo>
<Background skyAngle="0 3.14" skyColor=".8 .8 .8 0.6 0.6 0.6"></Background>

<!-- 카메라: 반경 8 원 위를 공전, 항상 원점(도형)을 바라봄 -->
<Viewpoint id="vp" position="0 0 8" orientation="0 1 0 0"></Viewpoint>

<!-- 카메라 위치를 원형으로 이동 (XZ 평면, 반경 8) -->
<PositionInterpolator id="campos"
  key="0  0.125  0.25  0.375  0.5  0.625  0.75  0.875  1"
  keyValue="
   0     0   8,
   5.657 0   5.657,
   8     0   0,
   5.657 0  -5.657,
   0     0  -8,
  -5.657 0  -5.657,
  -8     0   0,
  -5.657 0   5.657,
   0     0   8">
</PositionInterpolator>

<!-- 카메라 방향: Y축 기준으로 0→360도 회전 (위치와 동기화) -->
<OrientationInterpolator id="camorient"
  key="0  0.125  0.25  0.375  0.5  0.625  0.75  0.875  1"
  keyValue="
  0 1 0 0,
  0 1 0 0.7854,
  0 1 0 1.5708,
  0 1 0 2.3562,
  0 1 0 3.1416,
  0 1 0 3.9270,
  0 1 0 4.7124,
  0 1 0 5.4978,
  0 1 0 6.2832">
</OrientationInterpolator>

<TimeSensor id="camTimer" loop="true" cycleInterval="10" enabled="true"></TimeSensor>

<ROUTE fromNode="camTimer" fromField="fraction_changed"
       toNode="campos"     toField="set_fraction"></ROUTE>
<ROUTE fromNode="campos"   fromField="value_changed"
       toNode="vp"         toField="position"></ROUTE>

<ROUTE fromNode="camTimer"  fromField="fraction_changed"
       toNode="camorient"   toField="set_fraction"></ROUTE>
<ROUTE fromNode="camorient" fromField="value_changed"
       toNode="vp"          toField="orientation"></ROUTE>

<!-- 도형 -->
<Transform>
<Shape>
<IndexedFaceSet coordIndex="0 1 2 3 -1" solid="false">
  <Coordinate id="coord" point="-1 -1 0  1 -1 0  1 1 0  -1 1 0"></Coordinate>
</IndexedFaceSet>
<Appearance>
  <Material id="mat" diffuseColor="1 1 0"></Material>
</Appearance>
</Shape>
</Transform>

<CoordinateInterpolator id="coordint"
  key="0 0.25 0.5 0.75 1"
  keyValue="
  -1 -1 0   1 -1 0   1  1 0  -1  1 0
  -2 -1 0   1 -1 0   1  1 0  -1  1 0
  -2 -1 0   1 -2 0   1  2 0  -1  1 0
  -2 -1 0   1 -2 0   3  2 0  -3  1 0
  -2 -2 0   1 -2 0   3  3 0  -3  1 0">
</CoordinateInterpolator>

<ColorInterpolator id="colorint"
  key="0 0.25 0.5 0.75 1"
  keyValue="1 1 0,  1 0 0,  0 1 0,  0 0 1,  1 0 1">
</ColorInterpolator>

<TimeSensor id="time" loop="true" cycleInterval="4" enabled="true"></TimeSensor>

<ROUTE fromNode="time"     fromField="fraction_changed"
       toNode="coordint"   toField="set_fraction"></ROUTE>
<ROUTE fromNode="coordint" fromField="value_changed"
       toNode="coord"      toField="point"></ROUTE>
<ROUTE fromNode="time"     fromField="fraction_changed"
       toNode="colorint"   toField="set_fraction"></ROUTE>
<ROUTE fromNode="colorint" fromField="value_changed"
       toNode="mat"        toField="diffuseColor"></ROUTE>

</Scene>
</X3D>

</body>
</html>
