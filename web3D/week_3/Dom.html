<!DOCTYPE html>
<html>
<head>
<meta http-equiv='Content-Type' content='text/html;charset=utf-8'>
<title>요소찾기(Find Element, Web3D, VR, 가상현실, X3D)</title>
<script type="text/javascript" src="http://code.jquery.com/jquery-1.7.2.js"></script>
<script type='text/javascript' src="http://www.x3dom.org/x3dom/release/x3dom.js"></script>
<link rel='stylesheet' type='text/css' href="http://www.x3dom.org/x3dom/release/x3dom.css"/>
<script>
// 제목 토글
function changeTitle(){
    const h1 = document.getElementsByTagName("h1")[0];
    if(!h1) return;
    if(h1.textContent === '요소찾기(Find Element)') {
        h1.textContent = 'getElementsByTagName';
    } else {
        h1.textContent = '요소찾기(Find Element)';
    }
}

// X3DOM NavigationInfo headlight 토글
function light_toggle(){
    var nav = document.getElementById('nav');
    if(!nav) return;

    if(nav.getAttribute('headlight') === 'false' || nav.headlight === false){
        nav.setAttribute('headlight', 'true');
        nav.headlight = true;
    } else {
        nav.setAttribute('headlight', 'false');
        nav.headlight = false;
    }
}

// Sphere 색상 변경
function changeColor(color) {
    // #RRGGBB -> 0~1 RGB 변환
    const r = parseInt(color.substr(1,2),16)/255;
    const g = parseInt(color.substr(3,2),16)/255;
    const b = parseInt(color.substr(5,2),16)/255;

    const sphereMaterial = document.querySelector('Material');
    if(sphereMaterial){
        sphereMaterial.setAttribute('diffuseColor', `${r} ${g} ${b}`);
    }
}
</script>
</head>
<body id='main'>

<h1 id='title' style="text-align:center;">요소찾기(Find Element)</h1>

<!-- 버튼 -->
<input type='button' id='bt1' value="change_title" onclick="changeTitle();">
<input type='button' id='bt2' value="change_light" onclick="light_toggle();">
<input type='button' id='bt3' value="change_color" onclick="document.getElementById('colorPicker').click();">
<input type='color' id='colorPicker' style="display:none;" onchange="changeColor(this.value);">

<X3D width="600px" height="400px">
<Scene>
  <NavigationInfo id='nav' headlight='false' type='"walk" "Any"'></NavigationInfo>
  <Background skyAngle='0 3.14' skyColor='.8 .8 .8 0.6 0.6 0.6'></Background>

  <DirectionalLight id='dir' direction='0 -10 0' color='1 1 1' on='true'></DirectionalLight>

  <Transform translation='0 0 0'>
    <Shape>
      <Sphere></Sphere>
      <Appearance>
        <Material diffuseColor='1 0 0'></Material>
      </Appearance>
    </Shape>
  </Transform>
</Scene>
</X3D>

</body>
</html>
