<!DOCTYPE html>
<html>
<head>
<meta http-equiv='Content-Type' content='text/html;charset=utf-8'></meta>
<title>TouchSensor,Web3D,VR,가상현실,X3D,</title>
<script type="text/javascript" src="http://code.jquery.com/jquery-1.7.2.js"></script>
<script type='text/javascript' src="http://www.x3dom.org/x3dom/release/x3dom.js"></script>
<link rel='stylesheet' type='text/css' href="http://www.x3dom.org/x3dom/release/x3dom.css"/>
</head>
<body id='main'>
<h1 style="text-align:center;">TouchSensor</h1>
<X3D>
<Scene>
<NavigationInfo headlight='false' type='"walk" "Any"'></NavigationInfo> 
<Background skyAngle='0 3.14' skyColor='.8 .8 .8 0.6 0.6 0.6'>
</Background>
<DirectionalLight id='direct01' direction='0 -10 0' color='1 1 1' on='false'>
</DirectionalLight>
<DirectionalLight id='direct02' direction='-10 0 0' color='1 1 1' on='false'>
</DirectionalLight>
<Transform translation='2 0 0'>
<Shape><Sphere></Sphere>
<Appearance><Material diffuseColor='1 0 0'></Material>
</Appearance></Shape>
<TouchSensor id="touch01"></TouchSensor></Transform>
<Transform translation='-2 0 0'>
<Shape><Sphere></Sphere>
<Appearance><Material diffuseColor='0 0 1'></Material>
</Appearance></Shape>
<TouchSensor id="touch02"></TouchSensor></Transform>

<ROUTE fromNode='touch01' fromField='isOver' toNode='direct01' toField='on'></ROUTE>
<ROUTE fromNode='touch02' fromField='isActive' toNode='direct02' toField='on'></ROUTE>
</Scenee>
</X3D> 
</body>
</html>
