<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>X3D 카메라 근접 감지 라이트</title>
<link rel="stylesheet" href="https://www.x3dom.org/download/x3dom.css">
<script src="https://www.x3dom.org/download/x3dom.js"></script>
</head>
<body>

<h3>카메라가 Sphere에 가까워지면 DirectionalLight 켜짐 (배경 검은색)</h3>

<x3d width="800px" height="500px" style="border:1px solid #000;">
  <scene>
    <NavigationInfo type='"EXAMINE"' speed="0.5"></NavigationInfo>

    <!-- 배경 검은색 -->
    <Background skyColor="0 0 0"></Background>

    <!-- 1. 초기 카메라 -->
    <Viewpoint DEF="VP" position="0 0 15" description="Viewpoint"></Viewpoint>

    <!-- 2. 원점에 Sphere -->
    <Transform translation="0 0 0">
      <Shape>
        <Appearance>
          <Material diffuseColor="1 0 0"></Material>
        </Appearance>
        <Sphere radius="1"></Sphere>
      </Shape>
    </Transform>

    <!-- 3. DirectionalLight 초기 꺼짐 -->
    <DirectionalLight DEF="DirLight" direction="0 0 -1" on="false"></DirectionalLight>

    <!-- 4. ProximitySensor: 카메라 근접 감지 -->
    <ProximitySensor DEF="PS" size="6 6 6" center="0 0 0"></ProximitySensor>

    <!-- 5. ROUTE: 근접 감지 -> DirectionalLight on/off -->
    <ROUTE fromNode="PS" fromField="isActive" toNode="DirLight" toField="on"></ROUTE>

  </scene>
</x3d>

<p>카메라를 Sphere 근처로 이동하면 DirectionalLight가 켜지고, 멀어지면 꺼집니다. 배경은 검은색입니다.</p>

</body>
</html>
