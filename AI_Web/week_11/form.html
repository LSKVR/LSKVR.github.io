<!Doctype html>
<html>

<head>
  <title>예제4-1 form input</title>
  <meta charset="utf-8">
</head>

<body>
  <p>8. 폼태그 input </p>
  <form action="text.jsp" method="post">
    <label for="fname">이름:</label>
    <input type="text" id="fname" name="fname"><br>
    <label for="name">암호:</label>
    <input type="password"><br>
    라디오버튼:<input type="radio" value="남성">
    <input type="radio" value="여성">
    <input type="radio" value="아동"><br>
    체크박스:<input type="checkbox" value="남성">
    <input type="checkbox" value="여성">
    <input type="checkbox" value="아동"><br><br>
    <input type="button" value="제출">
    <input type="button" value="초기화">
    <input type="button" value="버튼">
  </form>
</body>
