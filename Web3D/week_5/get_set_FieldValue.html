<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>무조건 움직이는 박스</title>

<script src="https://www.x3dom.org/download/x3dom.js"></script>
<link rel="stylesheet" href="https://www.x3dom.org/download/x3dom.css"/>

<script>
window.onload = function() {

    const x3d = document.querySelector('x3d');
    const box = document.getElementById('trans');

    x3d.addEventListener('click', function(e) {

        const rect = x3d.getBoundingClientRect();

        // 마우스 위치 (0 ~ width / height)
        let x = e.clientX - rect.left;
        let y = e.clientY - rect.top;

        // 👉 X3D 좌표로 변환 (중앙 기준)
        let nx = (x / rect.width - 0.5) * 20;
        let ny = -(y / rect.height - 0.5) * 15;

        // 박스 이동
        box.setAttribute('translation', `${nx} ${ny} 0`);
    });
}
</script>

</head>

<body>

<h2 style="text-align:center;">클릭하면 무조건 이동</h2>

<x3d width="600px" height="400px">
<scene>

    <!-- 바닥 -->
    <Transform>
        <Shape>
            <Box size="10 10 0.1"></Box>
            <Appearance>
                <Material diffuseColor="0.7 0.7 0.7"></Material>
            </Appearance>
        </Shape>
    </Transform>

    <!-- 이동 박스 -->
    <Transform id="trans" translation="0 0 0">
        <Shape>
            <Box size="2 2 2"></Box>
            <Appearance>
                <Material diffuseColor="1 0 0"></Material>
            </Appearance>
        </Shape>
    </Transform>

</scene>
</x3d>

</body>
</html>
