<!DOCTYPE html>
<html>
<head>
<meta http-equiv='Content-Type' content='text/html;charset=utf-8'></meta>
<script type="text/javascript" src="http://code.jquery.com/jquery-1.7.2.js"></script>
<script type='text/javascript' src="http://www.x3dom.org/x3dom/release/x3dom.js"></script>
<link rel='stylesheet' type='text/css' href="http://www.x3dom.org/x3dom/release/x3dom.css"/>
<title>get,setAttribute,Web3D,VR,가상현실,X3D,</title>

<script>
function toggleColor(){ 
    // 색상 선택기 클릭
    document.getElementById("picker").click();
}

// HEX → X3D RGB 변환 함수
function changeColor(hex){
    var r = parseInt(hex.substr(1,2),16)/255;
    var g = parseInt(hex.substr(3,2),16)/255;
    var b = parseInt(hex.substr(5,2),16)/255;

    var rgb = r + " " + g + " " + b;

    document.getElementById('valueC').innerHTML =
        document.getElementById('mat').getAttribute('diffuseColor');

    document.getElementById('mat').setAttribute('diffuseColor', rgb);
}
</script>

</head>

<body id='main'>
<h1 style="text-align:center;">get,setAttribute()</h1>

<p style="text-align:center;"> 박스 색상 변환
<input type="button" id="color" value="팔레트 열기" onclick="toggleColor();">
</p>

<!-- 숨겨진 컬러 팔레트 -->
<input type="color" id="picker" style="display:none;" onchange="changeColor(this.value)">

<p id='valueC' style="text-align:center;"></p>

<X3D>
<Scene>
<Shape>
<Box size='2 2 2'></Box>
<Appearance>
<Material id='mat' diffuseColor='1 0 0'></Material>
</Appearance>
</Shape>
</Scene>
</X3D>

</body>
</html>
