<!DOCTYPE html>
<html>
<head>
<meta http-equiv='Content-Type' content='text/html;charset=utf-8'>
<title>요소찾기(Find Element)</title>

<script src="http://code.jquery.com/jquery-1.7.2.js"></script>
<script src="http://www.x3dom.org/x3dom/release/x3dom.js"></script>
<link rel="stylesheet" href="http://www.x3dom.org/x3dom/release/x3dom.css"/>

<script>
// 제목 토글
function changeTitle(){
    const h1 = document.getElementById("title");
    if(h1.textContent === '요소찾기(Find Element)') {
        h1.textContent = 'getElementsByTagName';
    } else {
        h1.textContent = '요소찾기(Find Element)';
    }
}

// 조명 토글
function light_toggle(){
    var nav = document.getElementById('nav');

    if(nav.getAttribute('headlight') === 'false'){
        nav.setAttribute('headlight', 'true');
    } else {
        nav.setAttribute('headlight', 'false');
    }
}

// 색상 변경
function changeColor(color) {
    const r = parseInt(color.substr(1,2),16)/255;
    const g = parseInt(color.substr(3,2),16)/255;
    const b = parseInt(color.substr(5,2),16)/255;

    const sphereMaterial = document.querySelector('Material');
    if(sphereMaterial){
        sphereMaterial.setAttribute('diffuseColor', `${r} ${g} ${b}`);
    }
}
</script>
</head>

<body>

<h1 id='title' style="text-align:center;">요소찾기(Find Element)</h1>

<!-- 버튼 -->
<input type='button' value="change_title" onclick="changeTitle();">
<input type='button' value="change_light" onclick="light_toggle();">
<input type='button' value="change_color" onclick="document.getElementById('colorPicker').click();">
<input type='color' id='colorPicker' style="display:none;" onchange="changeColor(this.value);">

<X3D width="600px" height="400px">
<Scene>
  <NavigationInfo id='nav' headlight='false'></NavigationInfo>

  <Background skyAngle='0 3.14' skyColor='.8 .8 .8 0.6 0.6 0.6'></Background>

  <DirectionalLight direction='0 -10 0' color='1 1 1'></DirectionalLight>

  <Transform>
    <Shape>
      <Sphere></Sphere>
      <Appearance>
        <Material diffuseColor='1 0 0'></Material>
      </Appearance>
    </Shape>
  </Transform>

</Scene>
</X3D>

</body>
</html>
