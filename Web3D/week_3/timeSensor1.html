<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://www.x3dom.org/download/x3dom.js"></script>
  <link rel="stylesheet" href="https://www.x3dom.org/download/x3dom.css">
</head>
<body>

<X3D width="600px" height="400px">
  <Scene>
    <!-- 배경 검정색 -->
    <Background skyColor='0 0 0'></Background>

    <!-- 첫 번째 라이트와 구 -->
    <Transform translation='-2 0 -5'>
      <DirectionalLight id='dir01' color='1 1 0' direction='0 0 -5' intensity='0'></DirectionalLight>
      <Shape>
        <Sphere radius="1"></Sphere>
        <Appearance>
          <Material diffuseColor='1 0 0'></Material>
        </Appearance>
      </Shape>
    </Transform>

    <!-- 두 번째 라이트와 구 -->
    <Transform translation='2 0 -5'>
      <DirectionalLight id='dir02' color='0 1 1' direction='0 0 -5' intensity='0'></DirectionalLight>
      <Shape>
        <Sphere radius="1"></Sphere>
        <Appearance>
          <Material diffuseColor='0 0 1'></Material>
        </Appearance>
      </Shape>
    </Transform>

    <!-- TimeSensor: 1초 주기 -->
    <TimeSensor id="time01" loop="true" cycleInterval="1"></TimeSensor>
    <TimeSensor id="time02" loop="true" cycleInterval="1"></TimeSensor>

    <!-- ScalarInterpolator: 완전히 꺼졌다 켜지게 -->
    <ScalarInterpolator id="blink01" key="0 0.5 1" keyValue="0 1 0"></ScalarInterpolator>
    <ScalarInterpolator id="blink02" key="0 0.5 1" keyValue="0 1 0"></ScalarInterpolator>

    <!-- ROUTE: TimeSensor → Interpolator → DirectionalLight intensity -->
    <ROUTE fromNode="time01" fromField="fraction_changed" toNode="blink01" toField="set_fraction"></ROUTE>
    <ROUTE fromNode="blink01" fromField="value_changed" toNode="dir01" toField="intensity"></ROUTE>

    <ROUTE fromNode="time02" fromField="fraction_changed" toNode="blink02" toField="set_fraction"></ROUTE>
    <ROUTE fromNode="blink02" fromField="value_changed" toNode="dir02" toField="intensity"></ROUTE>

  </Scene>
</X3D>

</body>
</html>
